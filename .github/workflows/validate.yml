name: validate

# Install-safety gate. A malformed manifest or skill silently breaks `/plugin install` for
# everyone, so validate on every push and PR and keep `main` always installable.

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Install deps
        run: pip install pyyaml
      - name: Validate manifests and skills
        run: python .github/scripts/validate.py
