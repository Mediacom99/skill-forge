name: check-sources

# Doc-drift detector. Weekly, it fetches the official source URLs behind each skill's reference
# library, hashes them, and compares to the committed snapshot. On change it refreshes the snapshot
# and opens/updates an issue telling the maintainer to run /refresh-references. No LLM, no secrets.

on:
  schedule:
    - cron: "0 9 * * 1" # Mondays 09:00 UTC
  workflow_dispatch:

permissions:
  contents: write
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - id: check
        name: Check sources for drift
        run: python .github/scripts/check_sources.py

      - name: Commit refreshed hashes
        run: |
          hashes=$(find plugins -name .source-hashes.json)
          if ! git diff --quiet -- $hashes; then
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add $hashes
            git commit -m "chore: refresh source hashes [skip ci]"
            git push
          fi

      - name: Open or update drift issue
        if: steps.check.outputs.has_drift == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          existing=$(gh issue list --state open --search "in:title Source docs changed" --json number --jq '.[0].number // empty')
          if [ -n "$existing" ]; then
            gh issue comment "$existing" --body-file drift.md
          else
            gh issue create --title "📡 Source docs changed — refresh references" --body-file drift.md
          fi
